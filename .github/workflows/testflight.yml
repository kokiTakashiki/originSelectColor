name: TestFlight Upload

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install Mint
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install mint

      - name: Install Genesis
        run: mint install yonaskolb/Genesis

      - name: Install XcodeGen
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen

      - name: Generate project.yml
        run: |
          DEVELOPMENT_TEAM=${{ secrets.DEVELOPMENT_TEAM }} \
          CODE_SIGN_STYLE=Manual \
          PRODUCT_BUNDLE_IDENTIFIER=${{ secrets.PRODUCT_BUNDLE_IDENTIFIER }} \
          mint run yonaskolb/Genesis genesis generate genesis.yml --non-interactive

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Decode Distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo "CERTIFICATE_PATH=$CERT_PATH" >> "$GITHUB_ENV"

      - name: Decode provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          echo "PROVISIONING_PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        env:
          APPSTORECONNECT_KEY_ID: ${{ secrets.APPSTORECONNECT_KEY_ID }}
          APPSTORECONNECT_ISSUER_ID: ${{ secrets.APPSTORECONNECT_ISSUER_ID }}
          APPSTORECONNECT_KEY_CONTENT: ${{ secrets.APPSTORECONNECT_KEY_CONTENT }}
          CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          PRODUCT_BUNDLE_IDENTIFIER: ${{ secrets.PRODUCT_BUNDLE_IDENTIFIER }}
        run: bundle exec fastlane beta
