name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Mint
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install mint

      - name: Install Genesis
        run: mint install yonaskolb/Genesis

      - name: Install XcodeGen
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen

      - name: Generate project.yml
        run: |
          DEVELOPMENT_TEAM=${{ secrets.DEVELOPMENT_TEAM }} \
          CODE_SIGN_STYLE=Automatic \
          PRODUCT_BUNDLE_IDENTIFIER=${{ secrets.PRODUCT_BUNDLE_IDENTIFIER }} \
          mint run yonaskolb/Genesis genesis generate genesis.yml --non-interactive

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project originSelectColor.xcodeproj \
            -scheme originSelectColor \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
